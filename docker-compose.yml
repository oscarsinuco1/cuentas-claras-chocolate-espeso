services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ccce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ccce_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ccce_secret_2024}
      POSTGRES_DB: ${POSTGRES_DB:-cuentas_claras}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ccce_user} -d ${POSTGRES_DB:-cuentas_claras}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ccce-network

  # Redis for Pub/Sub and Caching
  redis:
    image: redis:7-alpine
    container_name: ccce-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ccce-network

  # Backend API (Fastify)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ccce-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-ccce_user}:${POSTGRES_PASSWORD:-ccce_secret_2024}@postgres:5432/${POSTGRES_DB:-cuentas_claras}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-prod}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ccce-network

  # Frontend (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3000}
    container_name: ccce-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - ccce-network

volumes:
  postgres_data:
  redis_data:

networks:
  ccce-network:
    driver: bridge
